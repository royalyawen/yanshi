<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>青羊区餐厨油脂收运统计中心</title>
  <style>
    :root {
      --bg: #f3f6f7;
      --panel: #ffffff;
      --panel-soft: #f8faf9;
      --line: #d6dde1;
      --text: #17212b;
      --muted: #64737b;
      --teal: #0b5963;
      --teal-2: #0f6b72;
      --green: #2f7d5b;
      --red: #b94a42;
      --amber: #8a7650;
      --blue: #496a7d;
      --violet: #5f6673;
      --shadow: 0 12px 28px rgba(27, 43, 52, 0.08);
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-width: 1180px;
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 236px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #13252c;
      color: #e8efef;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #c7a35a;
      color: #13252c;
    }

    .brand strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: #a7bbb5;
      font-size: 12px;
    }

    .nav-button {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: #263c43;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 0 12px;
    }

    .nav-button.active {
      background: #0b5963;
      box-shadow: inset 3px 0 0 #c7a35a;
    }

    .sidebar-note {
      margin-top: auto;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      color: #b9cbc6;
      font-size: 12px;
      line-height: 1.7;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 78px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .page-title h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .breadcrumb {
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content {
      padding: 20px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .overview-metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      min-height: 92px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .metric strong {
      margin-top: 9px;
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .metric span {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .status-summary-item {
      min-height: 68px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f7faf9;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .status-summary-item label {
      color: var(--muted);
      font-size: 12px;
    }

    .status-summary-item strong {
      font-size: 22px;
      line-height: 1.1;
    }

    .layout-main {
      display: grid;
      grid-template-columns: minmax(680px, 1fr) 356px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-header {
      min-height: 54px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-header h2,
    .panel-header h3 {
      margin: 0;
      font-size: 16px;
    }

    .panel-body {
      padding: 16px;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      padding: 0 10px;
      color: var(--text);
      min-width: 96px;
    }

    .field.search {
      width: 210px;
    }

    .btn {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 0 11px;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #a8b9bd;
      background: #f7faf9;
    }

    .btn.primary {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .btn.danger {
      color: var(--red);
      border-color: #dfc6c1;
      background: #fbf6f5;
    }

    .btn.warning {
      color: #6f5f41;
      border-color: #d8c9aa;
      background: #faf7ef;
    }

    .btn.small {
      height: 28px;
      padding: 0 8px;
      font-size: 12px;
    }

    .icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 16px;
    }

    .icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .qingyang-map {
      width: 100%;
      height: 548px;
      display: block;
      background: #edf2f2;
      border-radius: 8px;
    }

    .street-shape {
      stroke: #ffffff;
      stroke-width: 3;
      transition: filter 0.15s ease, transform 0.15s ease, opacity 0.15s ease;
      cursor: pointer;
    }

    .street-group:hover .street-shape {
      filter: brightness(1.03) drop-shadow(0 6px 8px rgba(13, 67, 68, 0.25));
      transform: translateY(-2px);
    }

    .street-group.selected .street-shape {
      stroke: #173a42;
      stroke-width: 4;
    }

    .street-label {
      font-size: 18px;
      font-weight: 700;
      fill: #16383c;
      pointer-events: none;
    }

    .street-sub {
      font-size: 11px;
      fill: #315057;
      pointer-events: none;
    }

    .vehicle-dot {
      cursor: pointer;
    }

    .vehicle-body {
      fill: #fff;
      stroke: #1d4247;
      stroke-width: 2;
    }

    .vehicle-label {
      fill: #1d4247;
      font-size: 10px;
      font-weight: 700;
      pointer-events: none;
    }

    .map-legend {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .street-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rank-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 10px;
      align-items: center;
      background: var(--panel-soft);
      cursor: pointer;
    }

    .rank-no {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #e7eef0;
      color: #164c55;
      font-weight: 700;
    }

    .rank-row strong {
      display: block;
      font-size: 14px;
    }

    .rank-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 54px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .status-pill.done,
    .status-pill.normal,
    .status-pill.confirmed {
      color: #27694e;
      background: #edf5f0;
      border-color: #cfded6;
    }

    .status-pill.pending,
    .status-pill.unconfirmed {
      color: #6f5f41;
      background: #f8f4ea;
      border-color: #d9cbb0;
    }

    .status-pill.missing,
    .status-pill.abnormal,
    .status-pill.unhandled {
      color: #9d3f38;
      background: #fbf0ef;
      border-color: #dec2be;
    }

    .status-pill.ignored {
      color: #606f7b;
      background: #edf1f2;
      border-color: #d3dcdf;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      padding: 10px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      background: #f7faf9;
    }

    .sortable-th {
      border: 0;
      padding: 0;
      color: inherit;
      background: transparent;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .sortable-th:hover {
      color: var(--teal);
    }

    tr.clickable {
      cursor: pointer;
    }

    tr.clickable:hover td {
      background: #f4f8f8;
    }

    .table-wrap {
      overflow: auto;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .table-wrap table th:first-child,
    .table-wrap table td:first-child {
      padding-left: 14px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .quick-button {
      width: 100%;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
      display: grid;
      grid-template-columns: 32px 1fr 16px;
      align-items: center;
      gap: 10px;
      text-align: left;
    }

    .quick-button:hover {
      border-color: #a8b9bd;
      background: #f7faf9;
    }

    .quick-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #e8f0f1;
      color: var(--teal);
    }

    .quick-button strong {
      display: block;
    }

    .quick-button span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .route-map {
      width: 100%;
      height: 420px;
      background: #edf2f2;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: block;
    }

    .route-road {
      fill: none;
      stroke: #c8d2d2;
      stroke-width: 28;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-line {
      fill: none;
      stroke: var(--blue);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 10 8;
      animation: routeDash 2.6s linear infinite;
    }

    .route-line.history {
      stroke: var(--amber);
      stroke-dasharray: 0;
      animation: none;
    }

    @keyframes routeDash {
      to {
        stroke-dashoffset: -36;
      }
    }

    .merchant-dot {
      stroke: #fff;
      stroke-width: 3;
      cursor: pointer;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .segmented {
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f3f6f7;
      gap: 3px;
    }

    .segment {
      height: 28px;
      padding: 0 10px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
    }

    .segment.active {
      background: #fff;
      color: var(--teal);
      box-shadow: 0 1px 4px rgba(20, 54, 60, 0.12);
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .driver-layout {
      display: grid;
      grid-template-columns: 1fr 370px;
      gap: 16px;
      align-items: start;
    }

    .vehicle-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .vehicle-tab {
      min-width: 110px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 9px 10px;
      text-align: left;
    }

    .vehicle-tab.active {
      border-color: var(--teal);
      box-shadow: inset 0 0 0 1px var(--teal);
    }

    .vehicle-tab strong {
      display: block;
    }

    .vehicle-tab span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .monitor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .monitor {
      height: 150px;
      border-radius: 8px;
      overflow: hidden;
      background: #17282d;
      color: #d9eeeb;
      position: relative;
      border: 1px solid #25464c;
    }

    .monitor::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), transparent 35%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 4px);
    }

    .monitor span {
      position: absolute;
      left: 12px;
      bottom: 10px;
      font-size: 12px;
    }

    .monitor b {
      position: absolute;
      right: 10px;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6d8b73;
      box-shadow: 0 0 0 4px rgba(109, 139, 115, 0.16);
    }

    .video-toolbar {
      display: grid;
      grid-template-columns: 220px 220px 220px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .vehicle-current {
      justify-self: end;
      color: var(--muted);
    }

    .vehicle-current strong {
      color: var(--blue);
      margin: 0 6px;
    }

    .camera-grid-six {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      background: #edf2f3;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .camera-tile {
      aspect-ratio: 16 / 9;
      min-height: 210px;
      background: #020303;
      color: #d9e1e1;
      position: relative;
      overflow: hidden;
    }

    .camera-tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.045), transparent 22%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.035) 0, rgba(255,255,255,0.035) 1px, transparent 1px, transparent 5px);
    }

    .camera-label-top {
      position: absolute;
      left: 14px;
      top: 12px;
      z-index: 1;
      font-size: 14px;
    }

    .camera-label-center {
      position: absolute;
      left: 50%;
      top: 54%;
      z-index: 1;
      transform: translate(-50%, -50%);
      font-size: 14px;
      text-align: center;
    }

    .play-circle {
      width: 44px;
      height: 44px;
      margin: 0 auto 8px;
      border: 3px solid #f3f7f7;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #f3f7f7;
    }

    .play-circle::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 14px solid currentColor;
      margin-left: 4px;
    }

    .track-replay-map {
      height: 560px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f4f6f5;
      overflow: hidden;
    }

    .track-replay-map svg {
      width: 100%;
      height: calc(100% - 78px);
      display: block;
    }

    .track-player {
      height: 78px;
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: 48px 1fr 80px;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
    }

    .play-small {
      width: 34px;
      height: 34px;
      border: 1px solid #a9b7bd;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      color: #394b54;
    }

    .range-line {
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #d8dee4 0 45%, #496a7d 45% 70%, #d8dee4 70% 100%);
      position: relative;
    }

    .range-line::before,
    .range-line::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #9aa8b2;
      transform: translateY(-50%);
    }

    .range-line::before {
      left: 4%;
    }

    .range-line::after {
      left: 69%;
      border-color: var(--blue);
    }

    .track-chart-wrap {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .track-chart {
      width: 100%;
      height: 210px;
      display: block;
    }

    .summary-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-cell {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
      padding: 10px;
    }

    .summary-cell label {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .summary-cell strong {
      display: block;
      margin-top: 8px;
      font-size: 20px;
    }

    .container-list {
      display: grid;
      gap: 10px;
    }

    .container-item {
      display: grid;
      grid-template-columns: 110px 1fr 80px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .container-item strong {
      color: var(--teal);
    }

    .chart {
      width: 100%;
      height: 320px;
      display: block;
      background: #fff;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .chart-axis {
      stroke: #d4dfdc;
      stroke-width: 1;
    }

    .chart-grid {
      stroke: #edf2f1;
      stroke-width: 1;
    }

    .chart-label {
      fill: #6b7980;
      font-size: 11px;
    }

    .chart-line.food {
      fill: none;
      stroke: var(--teal);
      stroke-width: 3;
    }

    .chart-line.oil {
      fill: none;
      stroke: #7b735f;
      stroke-width: 3;
    }

    .chart-line.signed {
      fill: none;
      stroke: #6d7c83;
      stroke-width: 3;
    }

    .chart-point {
      stroke: #fff;
      stroke-width: 2;
      cursor: pointer;
    }

    .detail-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--panel-soft);
    }

      { id: "xiyuhe", name: "西御河街道", short: "西御河", color: "#cbd7d2", polygon: "813,209 898,232 882,326 804,302", label: [848, 270], vehiclePoints: [[852, 246]] },

    const state = {

      selectedVehicleId: null,
      selectedWaybillId: null,

      routeMode: "real",

      merchantMonth: "2026-05",

      merchantSearch: "",
      streetStatusFilter: "all",

      statsYear: "2026",

      overviewDataType: "全部",
      merchantSortKey: "oil",
      merchantSortDir: "desc",
      exceptionSelected: new Set(),
      waybillSelected: new Set()
    };

    const roads = ["蜀辉路", "清江东路", "光华北三路", "培风路", "青羊大道", "贝森北路", "文家场正街", "草堂路", "宁夏街", "西大街"];
    const shopTypes = ["火锅店", "川菜馆", "学校食堂", "酒店", "社区餐厅", "面馆", "串串店", "机关食堂"];
    const statuses = ["行驶中", "停靠中", "返厂中", "异常", "厂区内", "维修中"];
    const drivers = ["周建国", "李鹏", "王志强", "陈晓峰", "刘勇", "赵明", "何佳", "唐军"];

    const kitchenVehiclePlatesByStreetId = {
      wenjia: ["川A30007D"],
      kanghe: ["川A11533D"],
      caiqiao: ["川A10761D"],
      supo: ["川A16182D", "川A06637D"],
      jinsha: ["川A03409D"],
      caotang: ["川A13819D"],
      funan: ["川A05851D"],
      guanghua: ["川A02028D", "川A17257D"],
      shaocheng: ["川A09422D", "川A05681D"],
      wangjiaguai: [],
      xiyuhe: ["川A27593D"],
      caoshi: ["川A17569D"]
    };

    const oilVehiclePlatesByStandard = {
      "一标": "川AEM0656",
      "二标": "川AEL1818",
      "三标": "川AE92956",
      "四标": "川AEL1896"
    };

    const oilStandardByStreetId = {
      wenjia: "一标",
      kanghe: "一标",
      caiqiao: "一标",
      supo: "二标",
      jinsha: "二标",
      guanghua: "二标",
      caotang: "三标",
      funan: "三标",
      shaocheng: "三标",
      wangjiaguai: "四标",
      xiyuhe: "四标",
      caoshi: "四标"
    };

    function round2(num) {
      return Math.round(num * 100) / 100;
    }

    const CURRENT_STATS_YEAR = 2026;
    const CURRENT_STATS_MONTH = 6;
    const CURRENT_STATS_DAY = 16;

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function collectionDaysForMonth(month, year = CURRENT_STATS_YEAR) {
      if (year === CURRENT_STATS_YEAR && month === CURRENT_STATS_MONTH) return CURRENT_STATS_DAY;
      return daysInMonth(year, month);
    }

    function streetFoodForDay(streetIndex, day) {
      const baseValues = [7.25, 8.1, 10.65, 9.35, 7.85, 10.95, 8.7, 9.9, 7.55, 10.25, 8.35, 9.15];
      const offset = (((day + streetIndex * 3) % 7) - 3) * 0.18;
      return round2(Math.min(11, Math.max(7, baseValues[streetIndex % baseValues.length] + offset)));
    }

    function streetOilForDay(streetIndex = 0, day = CURRENT_STATS_DAY) {
      const baseValues = [0.52, 0.68, 0.93, 0.74, 0.88, 0.57, 0.96, 0.63, 0.79, 0.99, 0.71, 0.84];
      const offset = (((day + streetIndex * 2) % 5) - 2) * 0.035;
      return round2(Math.min(1, Math.max(0.5, baseValues[streetIndex % baseValues.length] + offset)));
    }

    function sumStreetMonthFood(streetIndex, month, year = CURRENT_STATS_YEAR) {
      const days = collectionDaysForMonth(month, year);
      return round2(Array.from({ length: days }, (_, dayIndex) => streetFoodForDay(streetIndex, dayIndex + 1))
        .reduce((total, value) => total + value, 0));
    }

    function allocateAmounts(total, weights) {
      const weightTotal = weights.reduce((sum, weight) => sum + weight, 0);
      if (!weightTotal) return weights.map(() => 0);
      const amounts = weights.map((weight) => round2(total * weight / weightTotal));
      const diff = round2(total - amounts.reduce((sum, value) => sum + value, 0));
      const lastIndex = weights.map((weight, index) => weight > 0 ? index : -1).filter((index) => index >= 0).pop();
      if (lastIndex !== undefined) amounts[lastIndex] = round2(amounts[lastIndex] + diff);
      return amounts;
    }

    function createData() {
      return baseStreets.map((street, index) => {
        const signed = 88 + index * 8 + (index % 3) * 5;
        const monthSigned = 8 + (index % 5) * 2;
        const foodMonth = sumStreetMonthFood(index, CURRENT_STATS_MONTH);
        const oilMonth = round2(Array.from({ length: collectionDaysForMonth(CURRENT_STATS_MONTH) }, (_, dayIndex) => streetOilForDay(index, dayIndex + 1))
          .reduce((total, value) => total + value, 0));
        const foodDaily = round2(foodMonth / collectionDaysForMonth(CURRENT_STATS_MONTH));
        const oilDaily = round2(oilMonth / collectionDaysForMonth(CURRENT_STATS_MONTH));
        const foodYesterday = streetFoodForDay(index, CURRENT_STATS_DAY - 1);
        const oilYesterday = streetOilForDay(index, CURRENT_STATS_DAY - 1);
        const foodToday = streetFoodForDay(index, CURRENT_STATS_DAY);
        const oilToday = streetOilForDay(index, CURRENT_STATS_DAY);
        const kitchenPlates = kitchenVehiclePlatesByStreetId[street.id] || [];
        const vehiclePoints = kitchenPlates.length
          ? kitchenPlates.map((_, j) => street.vehiclePoints[j % street.vehiclePoints.length])
          : [];
        const vehicleFoodAmounts = allocateAmounts(foodToday, vehiclePoints.map((_, j) => 1 + j * 0.35));
        const vehicleOilAmounts = allocateAmounts(oilToday, vehiclePoints.map((_, j) => 1 + j * 0.2));
        const vehicles = vehiclePoints.map((point, j) => {
          return {
            id: `${street.id}-v${j + 1}`,
            plate: kitchenPlates[j],
            driver: drivers[(index + j) % drivers.length],
            status: statuses[(index + j) % statuses.length],
            x: point[0],
            y: point[1],
            tasks: 18 + ((index + j) % 5) * 3,
            doneTasks: 12 + ((index + j) % 4) * 3,
            weight: vehicleFoodAmounts[j],
            oil: vehicleOilAmounts[j],
            workHours: round2(5.4 + ((index + j) % 4) * 0.7),
            abnormal: (index + j) % 4 === 0 ? 2 : (index + j) % 3
          };
        });
        const todayCollectedWeights = Array.from({ length: 9 }, (_, j) => (j + index) % 4 !== 0 ? 1 + (j % 4) * 0.16 : 0);
        const todayFoodAmounts = allocateAmounts(foodToday, todayCollectedWeights);
        const todayOilAmounts = allocateAmounts(oilToday, todayCollectedWeights);
        const historyAllocations = Array.from({ length: 31 }, (_, dayIndex) => {
          const day = dayIndex + 1;
          const weights = Array.from({ length: 9 }, (_, j) => (day + j + index) % 5 !== 0 ? 1 + (j % 4) * 0.16 : 0);
          return {
            food: allocateAmounts(streetFoodForDay(index, day), weights),
            oil: allocateAmounts(streetOilForDay(index, day), weights)
          };
        });
        const merchants = Array.from({ length: 9 }, (_, j) => {
          const collected = (j + index) % 4 !== 0;
          const monthlyFood = round2(historyAllocations.reduce((total, day) => total + day.food[j], 0));
          const monthlyOil = round2(historyAllocations.reduce((total, day) => total + day.oil[j], 0));
          const id = `${street.id}-m${j + 1}`;
          const history = Array.from({ length: 31 }, (_, dayIndex) => {
            const d = dayIndex + 1;
            const hasWork = (d + j + index) % 5 !== 0;
            return {
              date: `2026-05-${String(d).padStart(2, "0")}`,
              food: hasWork ? historyAllocations[dayIndex].food[j] : 0,
              oil: hasWork ? historyAllocations[dayIndex].oil[j] : 0,
              vehicle: vehicles.length ? vehicles[(j + d) % vehicles.length].plate : "--",
              driver: drivers[(j + d + index) % drivers.length],
              waybill: `LD-202605-${index + 1}${String(j + 1).padStart(2, "0")}${String(d).padStart(2, "0")}`,
              status: hasWork ? "已收运" : "未收运"
            };
          });
          return {
            id,
            name: `${street.short}${shopTypes[j % shopTypes.length]}${j + 1}号店`,
            streetId: street.id,
            address: `${street.name}${roads[(j + index) % roads.length]}${36 + j * 8}号`,
            contact: ["张经理", "罗店长", "马主任", "秦主管"][j % 4],
            container: `RFID-${index + 1}${String(j + 1).padStart(3, "0")}`,
            containers: [
              { type: "餐厨垃圾桶", code: `CJ-${index + 1}${String(j + 1).padStart(3, "0")}-01`, status: "在用" },
              { type: "油脂桶", code: `YZ-${index + 1}${String(j + 1).padStart(3, "0")}-01`, status: j % 5 === 0 ? "待巡检" : "在用" }
            ],
            contractStatus: j % 7 === 0 ? "合同临期" : "已签约",
            contractType: j % 3 === 0 ? "餐厨+废油" : (j % 3 === 1 ? "餐厨" : "废油"),
            signedAt: `2026-${String((j % 5) + 1).padStart(2, "0")}-${String(5 + j).padStart(2, "0")}`,
            collected,
            kitchenToday: collected ? todayFoodAmounts[j] : 0,
            oilToday: collected ? todayOilAmounts[j] : 0,
            kitchenMonth: monthlyFood,
            oilMonth: monthlyOil,
            lastTime: collected ? `${String(7 + (j % 8)).padStart(2, "0")}:${j % 2 ? "40" : "15"}` : "--",
            vehicle: vehicles.length ? vehicles[j % vehicles.length].plate : "--",
            driver: drivers[(j + index) % drivers.length],
            x: 120 + (j % 3) * 160 + (index % 2) * 20,
            y: 100 + Math.floor(j / 3) * 92 + (index % 3) * 14,
            history
          };
        });
        const monthly = Array.from({ length: 12 }, (_, m) => {
          const month = m + 1;
          const days = collectionDaysForMonth(month);
          return {
            month,
            signed: Math.round(signed * (0.78 + month * 0.018)),
            newSigned: 4 + ((month + index) % 6),
            food: sumStreetMonthFood(index, month),
            oil: round2(Array.from({ length: days }, (_, dayIndex) => streetOilForDay(index, dayIndex + 1))
              .reduce((total, value) => total + value, 0)),
            foodMerchants: Math.round(signed * (0.68 + (month % 3) * 0.04)),
            oilMerchants: Math.round(signed * (0.42 + (month % 4) * 0.03))
          };
        });
        const kitchenContainers = Math.round(signed * 1.18 + index * 2);
        const oilContainers = Math.round(signed * 0.64 + index);
        return {
          ...street,
          dataIndex: index,
          signed,
          monthSigned,
          kitchenContainers,
          oilContainers,
          containerCount: kitchenContainers + oilContainers,
          foodMonth,
          oilMonth,
          foodDaily,
          oilDaily,
          foodYesterday,
          oilYesterday,
          foodToday,
          oilToday,
          vehicles,
          merchants,
          monthly
        };
      });
    }

    const streets = createData();
    const streetMap = Object.fromEntries(streets.map((street) => [street.id, street]));
    const exceptions = createExceptions();
    const waybills = createWaybills();

    state.selectedVehicleId = streetMap[state.selectedStreetId].vehicles[0]?.id || null;
    state.selectedWaybillId = waybills.find((bill) => bill.streetId === state.selectedStreetId)?.id || null;
    state.selectedExceptionId = exceptions.find((item) => item.streetId === state.selectedStreetId)?.id || null;

    function createExceptions() {
      const reasons = ["超时未收运", "作业遗漏风险", "车辆越界", "打电话", "疲劳驾驶", "称重异常", "右侧盲区告警"];
      const rows = [];
      streets.forEach((street, i) => {
        street.vehicles.forEach((vehicle, j) => {
          rows.push({
            id: `EX-${i + 1}-${j + 1}-1`,
            streetId: street.id,
            street: street.name,
            time: `2026-06-16 ${String(8 + i % 6).padStart(2, "0")}:${String(10 + j * 17).padStart(2, "0")}`,
            plate: vehicle.plate,
            driver: vehicle.driver,
            reason: reasons[(i + j) % reasons.length],
            desc: `${street.short}片区任务存在未按计划完成风险，系统已关联车辆轨迹与前后 10 分钟录像。`,
            status: (i + j) % 4 === 0 ? "已处理" : "未处理",
            result: (i + j) % 4 === 0 ? "已整改" : "--",
            merchant: street.merchants[(i + j) % street.merchants.length].name
          });
        });
        if (i % 2 === 0) {
          const vehicle = street.vehicles[0] || { plate: "--", driver: "待分配" };
          rows.push({
            id: `EX-${i + 1}-M`,
            streetId: street.id,
            street: street.name,
            time: `2026-06-16 ${String(13 + i % 4).padStart(2, "0")}:25`,
            plate: vehicle.plate,
            driver: vehicle.driver,
            reason: "异常未收运商户",
            desc: `${street.merchants[0].name}当日未形成有效称重记录。`,
            status: "未处理",
            result: "--",
            merchant: street.merchants[0].name
          });
        }
      });
      return rows;
    }

    function createWaybills() {
      const rows = [];
      streets.forEach((street, i) => {
        street.merchants.slice(0, 7).forEach((merchant, j) => {
          const vehicle = street.vehicles[j % street.vehicles.length] || { plate: "--", driver: "待分配" };
          const billId = `LD-20260616-${String(i + 1).padStart(2, "0")}${String(j + 1).padStart(2, "0")}`;
          rows.push({
            id: billId,
            code: `20260616${String(i + 1).padStart(2, "0")}${String(j + 1).padStart(2, "0")}`,
            streetId: street.id,
            merchantId: merchant.id,
            merchant: merchant.name,
            street: street.name,
            collector: vehicle.driver,
            time: `2026-06-16 ${String(8 + j).padStart(2, "0")}:${j % 2 ? "35" : "05"}`,
            weight: round2(merchant.kitchenToday || 0.18 + j * 0.04),
            status: j % 5 === 0 ? "待确认" : "已确认",
            plate: vehicle.plate,
            producer: "成都市公共法律服务中心",
            transportCompany: "成都市兴环城市管理服务有限公司",
            disposalCompany: "成都市兴蓉万兴生态环保科技有限公司",
            receiver: "张德安",
            taskNo: `TASK-${street.short}-${String(j + 1).padStart(3, "0")}`,
            receiveDate: j % 4 === 0 ? "--" : "2026-06-16 18:20",
            buckets: [
              { rfid: merchant.container, weight: round2((merchant.kitchenToday || 0.22) * 0.46), time: `2026-06-16 ${String(8 + j).padStart(2, "0")}:08`, status: "已确认" },
              { rfid: `${merchant.container}-B`, weight: round2((merchant.kitchenToday || 0.22) * 0.54), time: `2026-06-16 ${String(8 + j).padStart(2, "0")}:26`, status: j % 5 === 0 ? "待确认" : "已确认" }
            ]
          });
          merchant.history.forEach((historyRow) => {
            if (historyRow.status === "已收运" && Number(historyRow.date.slice(-2)) % 7 === (j + 1) % 7) {
              historyRow.waybill = billId;
            }
          });
        });
      });
      return rows;
    }

    function icon(name) {
      return `<span class="icon">${icons[name] || ""}</span>`;
    }

    function fmtTon(num) {
      return `${Number(num || 0).toFixed(2)} t`;
    }

    function fmtDocTon(num) {
      return `${Number(num || 0).toFixed(3)} 吨`;
    }

    function fmtInt(num) {
      return String(Math.round(Number(num || 0)));
    }

    function sum(key, list = streets) {
      return round2(list.reduce((total, item) => total + Number(item[key] || 0), 0));
    }

    function overviewLabel() {
      if (state.overviewMode === "year") return `${state.overviewYear}年`;
      if (state.overviewMode === "month") return `${state.overviewYear}年${Number(state.overviewMonth)}月`;
      return state.overviewDate;
    }

    function overviewDateParts() {
      const fallback = `${state.overviewYear}-${state.overviewMonth}-16`;
      const parts = (state.overviewDate || fallback).split("-").map((item) => Number(item));
      return {
        year: parts[0] || Number(state.overviewYear),
        month: parts[1] || Number(state.overviewMonth),
        day: parts[2] || 16
      };
    }

    function dailyFactor(street, day) {
      return 1;
    }

    function dayFactor(street) {
      return dailyFactor(street, overviewDateParts().day);
    }

    function streetFoodOnDate(street, day) {
      return streetFoodForDay(street.dataIndex ?? streets.indexOf(street), day);
    }

    function streetOilOnDate(street, day) {
      return streetOilForDay(street.dataIndex ?? streets.indexOf(street), day);
    }

    function streetOverviewValues(street) {
      if (state.overviewMode === "year") {
        const monthTotal = street.monthly.reduce((total, row) => total + row.food, 0);
        const oilTotal = street.monthly.reduce((total, row) => total + row.oil, 0);
        const dayTotal = Array.from({ length: 12 }, (_, index) => collectionDaysForMonth(index + 1)).reduce((total, days) => total + days, 0);
        return {
          food: round2(monthTotal),
          oil: round2(oilTotal),
          foodAvg: round2(monthTotal / dayTotal),
          oilAvg: round2(oilTotal / dayTotal),
          foodYesterday: street.foodYesterday,
          oilYesterday: street.oilYesterday
        };
      }
      if (state.overviewMode === "day") {
        const day = overviewDateParts().day;
        return {
          food: streetFoodOnDate(street, day),
          oil: streetOilOnDate(street, day),
          foodAvg: street.foodDaily,
          oilAvg: street.oilDaily,
          foodYesterday: street.foodYesterday,
          oilYesterday: street.oilYesterday
        };
      }
      const row = street.monthly[Number(state.overviewMonth) - 1] || street.monthly[5];
      return {
        food: row.food,
        oil: row.oil,
        foodAvg: round2(row.food / collectionDaysForMonth(row.month)),
        oilAvg: round2(row.oil / collectionDaysForMonth(row.month)),
        foodYesterday: street.foodYesterday,
        oilYesterday: street.oilYesterday
      };
    }

    function districtMonthlyStats() {
      return Array.from({ length: 12 }, (_, index) => {
        const food = round2(streets.reduce((total, street) => total + street.monthly[index].food, 0));
        const oil = round2(streets.reduce((total, street) => total + street.monthly[index].oil, 0));
        return {
          month: index + 1,
          food,
          oil,
          foodAvg: round2(food / collectionDaysForMonth(index + 1)),
          oilAvg: round2(oil / collectionDaysForMonth(index + 1))
        };
      });
    }

    function districtDailyStats() {
      const { year, month } = overviewDateParts();
      const days = new Date(year, month, 0).getDate();
      return Array.from({ length: days }, (_, index) => {
        const day = index + 1;
        const food = round2(streets.reduce((total, street) => total + streetFoodOnDate(street, day), 0));
        const oil = round2(streets.reduce((total, street) => total + streetOilOnDate(street, day), 0));
        return {
          date: `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`,
          food,
          oil
        };
      });
    }

    function districtOverviewValues() {
      const values = streets.map(streetOverviewValues);
      return {
        food: round2(values.reduce((total, item) => total + item.food, 0)),
        oil: round2(values.reduce((total, item) => total + item.oil, 0)),
        foodAvg: round2(values.reduce((total, item) => total + item.foodAvg, 0)),
        oilAvg: round2(values.reduce((total, item) => total + item.oilAvg, 0)),
        foodYesterday: round2(values.reduce((total, item) => total + item.foodYesterday, 0)),
        oilYesterday: round2(values.reduce((total, item) => total + item.oilYesterday, 0)),
        foodToday: sum("foodToday"),
        oilToday: sum("oilToday")
      };
    }

    function selectedStreet() {
      return streetMap[state.selectedStreetId] || streets[0];
    }

    function allMerchants(street = selectedStreet()) {
      return street.merchants;
    }

    function selectedMerchant() {
      const street = selectedStreet();
      return street.merchants.find((merchant) => merchant.id === state.selectedMerchantId) || street.merchants[0];
    }

    function selectedVehicle() {
      const street = selectedStreet();
      return street.vehicles.find((vehicle) => vehicle.id === state.selectedVehicleId) || street.vehicles[0] || null;
    }

    function findWaybill(id) {
      return waybills.find((bill) => bill.id === id || bill.code === id);
    }

    function streetStatusStats(street) {
      const total = street.merchants.length;
      const done = street.merchants.filter((merchant) => merchant.collected).length;
      return { total, done, missing: total - done };
    }

    function streetMerchantRows(street) {
      if (state.streetStatusFilter === "done") {
        return street.merchants.filter((merchant) => merchant.collected);
      }
      if (state.streetStatusFilter === "missing") {
        return street.merchants.filter((merchant) => !merchant.collected);
      }
      return street.merchants;
    }

    function setStreetStatusFilter(value) {
      state.streetStatusFilter = value;
      render();
    }

    function setHeader(title, breadcrumb, actions = "") {
      document.getElementById("pageTitle").textContent = title;
      document.getElementById("breadcrumb").textContent = breadcrumb;
      document.getElementById("topActions").innerHTML = actions;
    }

    function render() {
      hideTooltip();
      if (state.view === "overview") return renderOverview();
      if (state.view === "street") return renderStreetDetail();
      if (state.view === "merchants") return renderMerchantManagement();
      if (state.view === "merchantDetail") return renderMerchantDetail();
      if (state.view === "drivers") return renderDriverManagement();
      if (state.view === "stats") return renderStats();
      if (state.view === "exceptions") return renderExceptions();
      if (state.view === "exceptionVideo") return renderExceptionVideo();
      if (state.view === "exceptionTrack") return renderExceptionTrack();
      if (state.view === "waybills") return renderWaybills();
    }

    function goOverview() {
      state.view = "overview";
      state.selectedStreetId = state.selectedStreetId || streets[0].id;
      render();
    }

    function openStreet(id) {
      state.selectedStreetId = id;
      state.streetStatusFilter = "all";
      const street = selectedStreet();
      state.selectedVehicleId = street.vehicles[0]?.id || null;
      state.selectedWaybillId = waybills.find((bill) => bill.streetId === id)?.id || null;
      state.selectedExceptionId = exceptions.find((item) => item.streetId === id)?.id || null;
      state.view = "street";
      render();
    }

    function goModule(view) {
      state.view = view;
      if (view === "drivers") {
        const street = selectedStreet();
        state.selectedVehicleId = street.vehicles[0]?.id || null;
      }
      if (view === "merchantDetail" && !state.selectedMerchantId) {
        state.selectedMerchantId = selectedStreet().merchants[0].id;
      }
      render();
    }

    function goMerchantDetail(id) {
      state.selectedMerchantId = id;
      state.view = "merchantDetail";
      render();
    }

    function renderOverview() {
      const district = districtOverviewValues();
      const containers = streets.reduce((total, street) => total + street.containerCount, 0);
      setHeader(
        "青羊区餐厨油脂收运统计中心",
        "平台统计中心 / 青羊区总览",
        `
          <input class="field search" placeholder="搜索车牌 / 商户 / 街道" onkeydown="if(event.key==='Enter') toast('已查询：' + this.value)" />
        `
      );
      document.getElementById("app").innerHTML = `
        <div class="metric-grid overview-metrics">
          ${metric("餐厨收运量", fmtTon(district.food), overviewLabel(), "calendar")}
          ${metric("餐厨今日收运", fmtTon(district.foodToday), "今日实时桶称重汇总", "stats")}
          ${metric("餐厨昨日收运", fmtTon(district.foodYesterday), "自然日 00:00-23:59", "stats")}
          ${metric("青羊区日均/月均", `${fmtTon(district.foodAvg)} / ${fmtTon(district.oilAvg)}`, "餐厨 / 废油", "route")}
          ${metric("废油收运量", fmtTon(district.oil), overviewLabel(), "calendar")}
          ${metric("废油今日收运", fmtTon(district.oilToday), "今日实时桶称重汇总", "stats")}
          ${metric("废油昨日收运", fmtTon(district.oilYesterday), "自然日 00:00-23:59", "stats")}
          ${metric("容器数量", `${fmtInt(containers)} 个`, "全区容器台账汇总", "merchant")}
        </div>
        <div class="panel">
          <div class="panel-header">
            <h2>青羊区街道收运地图</h2>
            <div class="filters">
              <span class="status-pill done">绿色：当日已收运</span>
              <span class="status-pill missing">红色：当日未收运</span>
            </div>
          </div>
          <div class="panel-body">
            ${renderDistrictMap()}
            <div class="map-legend">
              <span class="legend-item"><span class="legend-dot" style="background: var(--teal)"></span>街道餐厨/废油统计</span>
              <span class="legend-item"><span class="legend-dot" style="background: var(--blue)"></span>行驶中车辆</span>
              <span class="legend-item"><span class="legend-dot" style="background: var(--amber)"></span>停靠/返厂车辆</span>
              <span class="legend-item"><span class="legend-dot" style="background: var(--red)"></span>异常车辆</span>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <h3>青羊区整体日均/月均统计表</h3>
            <div class="filters">
              <div class="segmented">
                <button class="segment ${state.overviewMode === "year" ? "active" : ""}" onclick="setOverviewMode('year')">按年</button>
                <button class="segment ${state.overviewMode === "month" ? "active" : ""}" onclick="setOverviewMode('month')">按月</button>
                <button class="segment ${state.overviewMode === "day" ? "active" : ""}" onclick="setOverviewMode('day')">按日</button>
              </div>
              ${state.overviewMode !== "day" ? `
                <select class="field" onchange="state.overviewYear=this.value; render()">
                  ${["2024", "2025", "2026"].map((year) => `<option value="${year}" ${state.overviewYear === year ? "selected" : ""}>${year}年</option>`).join("")}
                </select>
              ` : ""}
              ${state.overviewMode === "month" ? `
                <select class="field" onchange="state.overviewMonth=this.value; render()">
                  ${Array.from({ length: 12 }, (_, index) => String(index + 1).padStart(2, "0")).map((month) => `<option value="${month}" ${state.overviewMonth === month ? "selected" : ""}>${Number(month)}月</option>`).join("")}
                </select>
              ` : ""}
              ${state.overviewMode === "day" ? `<input class="field" type="date" value="${state.overviewDate}" onchange="state.overviewDate=this.value; render()" />` : ""}
              <select class="field" onchange="state.overviewDataType=this.value; render()">
                ${["全部", "餐厨", "废油"].map((type) => `<option value="${type}" ${state.overviewDataType === type ? "selected" : ""}>${type}</option>`).join("")}
              </select>
            </div>
          </div>
          <div class="panel-body">
            ${districtStatsTable()}
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">
            <h3>街道排行与车辆状态</h3>
            <button class="btn small" onclick="exportOverview()">${icon("download")}导出</button>
          </div>
          <div class="panel-body">
            ${overviewStreetTable()}
          </div>
        </div>
      `;
    }

    function setOverviewMode(mode) {
      state.overviewMode = mode;
      render();
    }

    function districtStatsTable() {
      const showFood = state.overviewDataType !== "废油";
      const showOil = state.overviewDataType !== "餐厨";
      if (state.overviewMode === "day") {
        return `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  ${showFood ? "<th>餐厨当日收运量</th>" : ""}
                  ${showOil ? "<th>废油当日收运量</th>" : ""}
                  <th>统计口径</th>
                </tr>
              </thead>
              <tbody>
                ${districtDailyStats().map((row) => `
                  <tr>
                    <td>${row.date}</td>
                    ${showFood ? `<td>${fmtTon(row.food)}</td>` : ""}
                    ${showOil ? `<td>${fmtTon(row.oil)}</td>` : ""}
                    <td>实时桶称重日汇总</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        `;
      }
      const rows = state.overviewMode === "month"
        ? districtMonthlyStats().filter((row) => row.month === Number(state.overviewMonth))
        : districtMonthlyStats();
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>月份</th>
                ${showFood ? "<th>餐厨月收运量</th>" : ""}
                ${showOil ? "<th>废油月收运量</th>" : ""}
                ${showFood ? "<th>餐厨日均</th>" : ""}
                ${showOil ? "<th>废油日均</th>" : ""}
                <th>统计年份</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${row.month}月</td>
                  ${showFood ? `<td>${fmtTon(row.food)}</td>` : ""}
                  ${showOil ? `<td>${fmtTon(row.oil)}</td>` : ""}
                  ${showFood ? `<td>${fmtTon(row.foodAvg)}</td>` : ""}
                  ${showOil ? `<td>${fmtTon(row.oilAvg)}</td>` : ""}
                  <td>${state.overviewYear}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function overviewStreetTable() {
      const rows = streets
        .slice()
        .sort((a, b) => b.foodToday + b.oilToday - (a.foodToday + a.oilToday));
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>序号</th>
                <th>街道名称</th>
                <th>餐厨日均</th>
                <th>餐厨昨日收运量</th>
                <th>餐厨当日收运量</th>
                <th>废油日均</th>
                <th>废油昨日收运量</th>
                <th>废油当日收运量</th>
                <th>街道餐厨车牌</th>
                <th>废油收运车牌</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((street, index) => {
                const kitchenPlates = street.vehicles.map((vehicle) => vehicle.plate);
                const oilStandard = oilStandardByStreetId[street.id];
                const oilPlate = oilStandard ? oilVehiclePlatesByStandard[oilStandard] : "";
                return `
                  <tr class="clickable" onclick="openStreet('${street.id}')">
                    <td>${index + 1}</td>
                    <td>${street.name}</td>
                    <td>${fmtTon(street.foodDaily)}</td>
                    <td>${fmtTon(street.foodYesterday)}</td>
                    <td>${fmtTon(street.foodToday)}</td>
                    <td>${fmtTon(street.oilDaily)}</td>
                    <td>${fmtTon(street.oilYesterday)}</td>
                    <td>${fmtTon(street.oilToday)}</td>
                    <td>${kitchenPlates.join("、") || "待分配"}</td>
                    <td>${oilPlate ? `${oilPlate}（${oilStandard}）` : "待分配"}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function metric(label, value, hint, iconName) {
      return `
        <div class="metric">
          <label>${icon(iconName)}${label}</label>
          <strong>${value}</strong>
          <span>${hint}</span>
        </div>
      `;
    }

    function renderDistrictMap() {
      const vehicleColor = (status) => {
        if (status === "异常" || status === "维修中") return "var(--red)";
        if (status === "停靠中" || status === "返厂中" || status === "厂区内") return "var(--amber)";
        return "var(--blue)";
      };
      return `
        <svg class="qingyang-map" viewBox="0 0 1000 520" role="img" aria-label="青羊区街道收运地图">
          <defs>
            <linearGradient id="mapWater" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stop-color="#e8f3ef"/>
              <stop offset="100%" stop-color="#f7fbfa"/>
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="1000" height="520" fill="url(#mapWater)" />
          <path d="M35 405 C160 466 265 420 362 466 S590 470 720 448 S900 415 972 455" fill="none" stroke="#d2e4df" stroke-width="18" stroke-linecap="round" opacity="0.8" />
          ${streets.map((street) => `
            <g class="street-group ${state.selectedStreetId === street.id ? "selected" : ""}" onclick="openStreet('${street.id}')" onmousemove="showStreetTooltip(event, '${street.id}')" onmouseleave="hideTooltip()">
              <polygon class="street-shape" points="${street.polygon}" fill="${street.color}"></polygon>
              <text class="street-label" x="${street.label[0]}" y="${street.label[1]}" text-anchor="middle">${street.short}</text>
              <text class="street-sub" x="${street.label[0]}" y="${street.label[1] + 20}" text-anchor="middle">今 ${street.foodToday.toFixed(1)}t / 油 ${street.oilToday.toFixed(1)}t</text>

    function sortMerchants(key) {
      if (state.merchantSortKey === key) {

        state.merchantSortDir = "desc";

      render();

    function merchantSortValue(merchant, key) {
      const multiplier = state.merchantMode === "year" ? 11.4 : 1;
      if (key === "food") return merchant.kitchenMonth * multiplier;
      return merchant.oilMonth * (state.merchantMode === "year" ? 11.2 : 1);
    }

    function filterMerchants(street) {
      const keyword = state.merchantSearch.trim().toLowerCase();
      const rows = keyword ? street.merchants.filter((merchant) =>
        [merchant.name, merchant.address, merchant.container, street.name].some((value) => String(value).toLowerCase().includes(keyword))
      ) : street.merchants.slice();
      return rows.sort((a, b) => {
        const left = merchantSortValue(a, state.merchantSortKey);
        const right = merchantSortValue(b, state.merchantSortKey);
        return state.merchantSortDir === "asc" ? left - right : right - left;
      });
    }

    function lineChart(rows, label) {
      const width = 620;
      const height = 320;
      const pad = { left: 48, right: 20, top: 28, bottom: 42 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const maxValue = Math.max(...rows.map((row) => Math.max(row.food, row.oil)), 1);
      const maxSigned = Math.max(...rows.map((row) => row.signed || 1), 1);
      const x = (index) => pad.left + (index / 11) * chartW;
      const yFood = (value) => pad.top + chartH - (value / maxValue) * chartH;
      const ySigned = (value) => pad.top + chartH - (value / maxSigned) * chartH;
      const path = (key, yFunc) => rows.map((row, index) => `${index === 0 ? "M" : "L"} ${x(index).toFixed(2)} ${yFunc(row[key]).toFixed(2)}`).join(" ");
      return `
        <svg class="chart" viewBox="0 0 ${width} ${height}" role="img" aria-label="${label}年度累计趋势图">
          ${[0, 1, 2, 3, 4].map((i) => {
            const y = pad.top + (i / 4) * chartH;
            return `<line class="chart-grid" x1="${pad.left}" x2="${width - pad.right}" y1="${y}" y2="${y}"/>`;
          }).join("")}
          <line class="chart-axis" x1="${pad.left}" x2="${pad.left}" y1="${pad.top}" y2="${height - pad.bottom}"/>
          <line class="chart-axis" x1="${pad.left}" x2="${width - pad.right}" y1="${height - pad.bottom}" y2="${height - pad.bottom}"/>
          ${rows.map((row, index) => `
            <text class="chart-label" x="${x(index)}" y="${height - 18}" text-anchor="middle">${row.month}月</text>
          `).join("")}
          <path class="chart-line food" d="${path("food", yFood)}"/>
          <path class="chart-line oil" d="${path("oil", yFood)}"/>
          <path class="chart-line signed" d="${path("signed", ySigned)}"/>
          ${rows.map((row, index) => `
            <circle class="chart-point" cx="${x(index)}" cy="${yFood(row.food)}" r="4" fill="var(--teal)" onmousemove="showChartTooltip(event, '${label}', '${row.month}月', ${row.food}, ${row.oil}, ${row.signed || 0})" onmouseleave="hideTooltip()" onclick="toast('${label} ${row.month}月明细已定位')"/>
            <circle class="chart-point" cx="${x(index)}" cy="${yFood(row.oil)}" r="4" fill="var(--amber)" onmousemove="showChartTooltip(event, '${label}', '${row.month}月', ${row.food}, ${row.oil}, ${row.signed || 0})" onmouseleave="hideTooltip()" onclick="toast('${label} ${row.month}月明细已定位')"/>
          `).join("")}
          <text x="${pad.left}" y="18" fill="#16383c" font-size="13" font-weight="700">${label} · ${state.statsYear}</text>
          <g transform="translate(${width - 250}, 16)">
            <circle cx="0" cy="0" r="5" fill="var(--teal)"/><text x="10" y="4" class="chart-label">餐厨累计</text>
            <circle cx="84" cy="0" r="5" fill="var(--amber)"/><text x="94" y="4" class="chart-label">废油累计</text>
            <circle cx="178" cy="0" r="5" fill="var(--blue)"/><text x="188" y="4" class="chart-label">签约</text>
          </g>
        </svg>
      `;
    }

    function showChartTooltip(event, label, month, food, oil, signed) {
      const tooltip = document.getElementById("chartTooltip");
      document.getElementById("tooltip").hidden = true;
      tooltip.hidden = false;
      tooltip.innerHTML = `

    }

      const ids = Array.from(state.exceptionSelected);

      }
      const headers = Object.keys(rows[0]);
      const escape = (value) => `"${String(value ?? "").replace(/"/g, '""')}"`;
      const csv = [headers.join(","), ...rows.map((row) => headers.map((header) => escape(row[header])).join(","))].join("\n");
      const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast(`已导出：${filename}`);
    }

    function exportOverview() {
      downloadCsv(`青羊区街道收运总览_${overviewLabel()}.csv`, streets.map((street) => {
        const values = streetOverviewValues(street);
        return {
          街道: street.name,
          容器数量: street.containerCount,
          餐厨垃圾桶: street.kitchenContainers,
          油脂桶: street.oilContainers,
          餐厨日均: values.foodAvg,
          废油日均: values.oilAvg,
          昨日餐厨: values.foodYesterday,
          昨日废油: values.oilYesterday,
          餐厨收运量: values.food,
          废油收运量: values.oil,
          车辆数: street.vehicles.length
        };
      }));
    }

    function exportStreetMerchants() {
      const street = selectedStreet();
      downloadCsv(`${street.name}_商户收运状态_20260616.csv`, streetMerchantRows(street).map((merchant) => ({
        商户: merchant.name,
        地址: merchant.address,
        状态: merchant.collected ? "已收运" : "未收运",
        当日餐厨: merchant.kitchenToday,
        当日废油: merchant.oilToday,
        末次收运: merchant.lastTime,
        车辆: merchant.vehicle,
        驾驶员: merchant.driver
      })));
    }

    function exportMerchantRows() {
      const street = selectedStreet();
      downloadCsv(`${street.name}_商户管理_${state.merchantMode === "year" ? state.merchantYear : state.merchantMonth}.csv`, filterMerchants(street).map((merchant) => ({
        商户: merchant.name,
        街道: street.name,
        地址: merchant.address,
        容器数量: merchant.containers.length,
        餐厨收运量: state.merchantMode === "year" ? round2(merchant.kitchenMonth * 11.4) : merchant.kitchenMonth,
        废油收运量: state.merchantMode === "year" ? round2(merchant.oilMonth * 11.2) : merchant.oilMonth,
        签约状态: merchant.contractStatus,
        合同类型: merchant.contractType
      })));
    }

    function exportMerchantHistory() {
      const merchant = selectedMerchant();
      const rows = state.historyDate ? merchant.history.filter((item) => item.date === state.historyDate) : merchant.history;
      downloadCsv(`${merchant.name}_历史收运数据.csv`, rows.map((row) => ({
        日期: row.date,
        餐厨收运量: row.food,
        废油收运量: row.oil,
        状态: row.status,
        车牌: row.vehicle,
        驾驶员: row.driver,
        电子联单: row.waybill
      })));
    }

    function exportVehicleTasks() {
      const street = selectedStreet();
      const vehicle = selectedVehicle();
      downloadCsv(`${vehicle.plate}_当日收运排班.csv`, vehicleScheduleRows(street, vehicle).map((merchant) => ({
        收运点名称: merchant.name,
        收运状态: merchant.collected ? "已完成" : "未收运",
        餐厨垃圾收运量: merchant.kitchenToday,
        废油收运量: merchant.oilToday
      })));
    }

    function exportStats() {
      const street = selectedStreet();
      downloadCsv(`${street.name}_${state.statsYear}年度统计.csv`, street.monthly.map((row) => ({
        月份: `${row.month}月`,
        签约商户数: row.signed,
        新增签约: row.newSigned,
        废油累计量: row.oil,
        餐厨累计量: row.food,
        餐厨商户数: row.foodMerchants,
        废油商户数: row.oilMerchants
      })));
    }

    function exportExceptions() {
      const street = selectedStreet();
      downloadCsv(`${street.name}_异常清单.csv`, exceptions.filter((item) => item.streetId === street.id).map((item) => ({
        所属街道: item.street,
        触发时间: item.time,
        车牌号: item.plate,
        驾驶员: item.driver,
        异常原因: item.reason,
        异常说明: item.desc,
        状态: item.status,
        处理结果: item.result
      })));
    }

    function exportSelectedWaybills() {
      const street = selectedStreet();
      let rows = waybills.filter((bill) => bill.streetId === street.id && state.waybillSelected.has(bill.id));
      if (!rows.length) rows = waybills.filter((bill) => bill.streetId === street.id);
      downloadCsv(`${street.name}_电子联单.csv`, rows.map((bill) => ({
        联单号: bill.id,
        商户: bill.merchant,
        街道: bill.street,
        收运人: bill.collector,
        时间: bill.time,
        重量: bill.weight,
        确认状态: bill.status,
        车牌: bill.plate,
        任务编号: bill.taskNo
      })));
    }

    function exportOneWaybill(id) {
      const bill = waybills.find((item) => item.id === id);
      if (!bill) return;
      downloadCsv(`${bill.id}_车次联单详情.csv`, bill.buckets.map((bucket) => ({
        联单号: bill.id,
        商户: bill.merchant,
        车牌号: bill.plate,
        收运人员: bill.collector,
        容器: bucket.rfid,
        单桶重量: bucket.weight,
        称重时间: bucket.time,
        确认状态: bucket.status,
        总重量: bill.weight,
        接收日期: bill.receiveDate
      })));
    }

    function toast(message) {
      const el = document.getElementById("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 2400);
    }

    render();
  </script>
</body>
</html>
